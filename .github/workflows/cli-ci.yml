name: CLI CI

on:
  push:
    paths:
      - 'cli/**'
      - '.github/workflows/cli-ci.yml'
  pull_request:
    paths:
      - 'cli/**'
  workflow_dispatch:

jobs:
  test:
    name: Test (Ubuntu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Run tests
        run: cd cli && cargo test

  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            bin: lnw-cli.exe
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            bin: lnw-cli
          - target: x86_64-apple-darwin
            os: macos-latest
            bin: lnw-cli

    steps:
      - uses: actions/checkout@v4
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Build
        run: cd cli && cargo build --release --target ${{ matrix.target }}
      - name: Upload Binary
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.target }}
          path: cli/target/${{ matrix.target }}/release/${{ matrix.bin }}
